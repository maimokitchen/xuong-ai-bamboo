// ============ UTILS ============
function genId() { return 'tl_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function genShareCode() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let c = ''; for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function copyText(text, label) {
  navigator.clipboard.writeText(text).then(() => showToast(label || '✓ Đã sao chép!'));
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function extractJSON(raw) {
  let s = raw.replace(/```json|```/g, '').trim();
  const a = s.indexOf('{');
  if (a === -1) throw new Error('Không tìm thấy dữ liệu JSON');
  const b = s.lastIndexOf('}');
  if (b > a) { try { return JSON.parse(s.slice(a, b + 1)); } catch(e) {} }
  let frag = s.slice(a), inStr = false, esc = false;
  const stack = [];
  for (const ch of frag) {
    if (esc) { esc = false; continue; }
    if (ch === '\\') { esc = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (!inStr) {
      if (ch === '{') stack.push('}');
      else if (ch === '[') stack.push(']');
      else if (ch === '}' || ch === ']') stack.pop();
    }
  }
  if (inStr) frag += '"';
  frag = frag.replace(/,\s*$/, '');
  while (stack.length) frag += stack.pop();
  return JSON.parse(frag);
}

// ============ API — Claude qua Proxy ============
async function callClaude({ messages, system }) {
  const res = await fetch('/api/chat', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, system }),
  });
  const rawText = await res.text();
  let data;
  try { data = JSON.parse(rawText); }
  catch (e) { throw new Error(`Server trả về phản hồi không hợp lệ (status ${res.status}).`); }
  if (data.error) throw new Error(data.error);
  return { text: data.text };
}

async function handleAuthSubmit() {

  state.authBusy = true; render();
  try {

    }
  } catch (e) {
    state.authError = translateAuthError(e.message);
  } finally {
    state.authBusy = false; render();
  }
}

function translateAuthError(msg) {
  if (/invalid login credentials/i.test(msg)) return 'Email hoặc mật khẩu không đúng';
  if (/already registered/i.test(msg)) return 'Email này đã được đăng ký — thử đăng nhập';
  if (/password.*least/i.test(msg)) return 'Mật khẩu cần ít nhất 6 ký tự';
  if (/email/i.test(msg) && /invalid/i.test(msg)) return 'Email không hợp lệ';
  return msg;
}

async function sendBrainstorm(prefill) {

  const content = (prefill ?? (inputEl ? inputEl.value : '')).trim();
  if (!content || state.loading) return;
  state.error = ''; if (inputEl) inputEl.value = '';
  const next = [...state.brainMsgs, { role: 'user', content }];
  state.brainMsgs = next; state.loading = true; render();
  try {
    const { text } = await callClaude({ messages: next.map(({role,content})=>({role,content})), system: BRAINSTORM_SYSTEM });
    state.brainMsgs = [...next, { role: 'assistant', content: text }];
  } catch(e) {
    state.error = 'Không gọi được AI: ' + e.message;
    state.brainMsgs = state.brainMsgs.slice(0, -1);
  } finally { state.loading = false; render(); }
}

async function buildBlueprint() {
  const userTurns = state.brainMsgs.filter(m => m.role === 'user').length;
  if (userTurns < 2 || state.building) return;
  state.error = ''; state.building = true; render();
  const convo = state.brainMsgs.map(m => `${m.role==='user'?'Người dùng':'Kiến trúc sư'}: ${m.content}`).join('\n\n');
  let parsed = null;
  for (let attempt = 1; attempt <= 2 && !parsed; attempt++) {
    try {
      const extra = attempt === 2 ? '\n\nLƯU Ý: lần trước JSON bị lỗi/quá dài. Hãy trả về JSON NGẮN GỌN HƠN.' : '';
      const { text } = await callClaude({ messages: [{ role:'user', content:`Cuộc trò chuyện brainstorm:\n\n${convo}\n\nHãy tạo bản thiết kế JSON.${extra}` }], system: BLUEPRINT_SYSTEM });
      parsed = extractJSON(text);
    } catch(e) { if (attempt === 2) state.error = 'Không tạo được bản thiết kế: ' + e.message; }
  }
  state.building = false;
  if (parsed) { state.blueprint = parsed; state.createStep = 2; }
  render();
}

      <td>${c.used_at ? new Date(c.used_at).toLocaleDateString('vi-VN') : '—'}</td>
      <td>
        ${c.status === 'unused' ? `<button class="btn btn-danger btn-sm" onclick="toggleCodeStatus('${c.code}','disabled')">Vô hiệu hoá</button>` : ''}
        ${c.status === 'disabled' ? `<button class="btn btn-ghost btn-sm" onclick="toggleCodeStatus('${c.code}','unused')">Kích hoạt lại</button>` : ''}
      </td>
    </tr>`).join('');

  return `
  <div class="lib-header"><h2 class="lib-title">🔑 Quản trị mã truy cập</h2></div>

  <div class="admin-section">
    <div class="admin-stat-grid">
      <div class="admin-stat"><div class="admin-stat-num">${codes.length}</div><div class="admin-stat-label">Tổng số mã</div></div>
      <div class="admin-stat"><div class="admin-stat-num">${unused}</div><div class="admin-stat-label">Chưa dùng</div></div>
      <div class="admin-stat"><div class="admin-stat-num">${used}</div><div class="admin-stat-label">Đã dùng</div></div>
      <div class="admin-stat"><div class="admin-stat-num">${disabled}</div><div class="admin-stat-label">Đã vô hiệu hoá</div></div>
    </div>
  </div>

  <div class="admin-section">
    <div class="admin-section-title">✦ Tạo mã mới theo lô</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div>
        <label class="auth-label">Số lượng</label>
        <input class="auth-input" type="number" min="1" max="200" style="width:100px" value="${state.adminGenQty}" oninput="state.adminGenQty=this.value">
      </div>
      <div>
        <label class="auth-label">Nguồn</label>
        <select class="auth-input" style="width:200px" onchange="state.adminGenSource=this.value">
          <option value="workshop199" ${state.adminGenSource==='workshop199'?'selected':''}>Workshop 199k</option>
          <option value="workshop2868" ${state.adminGenSource==='workshop2868'?'selected':''}>Workshop 2.868k</option>
          <option value="paid393">Mua trực tiếp 393k</option>
          <option value="manual">Khác / thủ công</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="generateCodes()" ${state.adminGenBusy?'disabled':''}>${state.adminGenBusy?'Đang tạo...':'+ Tạo mã'}</button>
      <button class="btn btn-outline" onclick="exportCodesCsv()">⤓ Xuất CSV (mã chưa dùng)</button>
    </div>
  </div>

  <div class="admin-section">
    <div class="admin-section-title">📋 Danh sách mã (${codes.length})</div>
    ${!state.adminLoaded ? `<div style="text-align:center;padding:20px;color:var(--soft)">Đang tải...</div>` : `
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr><th>Mã</th><th>Trạng thái</th><th>Nguồn</th><th>Dùng lúc</th><th>Hành động</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:var(--soft);padding:20px">Chưa có mã nào</td></tr>'}</tbody>
      </table>
    </div>`}
  </div>`;
}

// ============ MAIN RENDER ============
function render() {
  const root = document.getElementById('app-root');
  if (state.authLoading) { root.innerHTML = `<div style="text-align:center;padding:80px;color:var(--soft)">Đang tải...</div>`; return; }
  if (!state.session) { root.innerHTML = renderAuth(); return; }
  if (!state.hasAccess && !state.profile?.is_admin) {
    root.innerHTML = headerHtml() + renderGate() + footerHtml(); return;
  }
  let content = '';
  if (state.view === 'library') content = renderLibrary();
  else if (state.view === 'create') content = renderCreate();
  else if (state.view === 'run') content = renderRun();
  else if (state.view === 'admin') content = renderAdmin();
  const isWide = state.view === 'admin';
  root.innerHTML = headerHtml() + `<main class="main ${isWide?'wide':''}">${content}</main>` + footerHtml()
    + renderPubModal() + renderImportModal() + renderRefinePanel();
  scrollToEnd('chat-end'); scrollToEnd('test-end');
}
function scrollToEnd(id) {
  setTimeout(() => { const el = document.getElementById(id); if (el) el.scrollIntoView({behavior:'smooth'}); }, 50);
}

// ============ INIT ============
render();
initAuth();

</script>
</body>
</html>
